<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Гайды по выбору техники — BORMAN</title>
<meta name="description" content="Полезные гайды BORMAN: как выбрать стайлер, утюжок, плойку или увлажнитель, как ухаживать за техникой и не навредить волосам.">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#211f1b">
<link rel="canonical" href="https://maybenexttimez.github.io/borman-shop/guides.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Гайды по выбору техники — BORMAN">
<meta property="og:description" content="Как выбрать стайлер, утюжок, плойку и увлажнитель — экспертные гайды BORMAN.">
<meta property="og:image" content="https://maybenexttimez.github.io/borman-shop/assets/og-cover.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://maybenexttimez.github.io/borman-shop/assets/og-cover.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shop.css">
<style>
  .ghead{padding:128px 0 26px;text-align:center}
  .ghead h1{font-size:clamp(38px,5.5vw,68px)}
  .ghead p{color:var(--ink2);margin-top:12px;max-width:620px;margin-left:auto;margin-right:auto}
  .gwrap{padding-bottom:40px}
  .gcrumb{font-size:13px;color:var(--ink2);margin-bottom:22px}.gcrumb a:hover{color:var(--gold)}
  .gart-cta{background:var(--char);color:var(--paper);border-radius:20px;padding:34px;text-align:center;margin-top:44px}
  .gart-cta h3{color:var(--paper);font-size:26px;margin-bottom:8px}
  .gart-cta p{color:#cfc4b2;margin-bottom:18px}
  @media(max-width:960px){.ghead{padding-top:104px}}
</style>
</head>
<body>
<script>window.__BASE__='';</script>
<div class="gwrap"><div class="wrap" style="padding-top:0">
  <div id="glist" style="display:none">
    <div class="ghead"><div class="eyebrow rv">Помощь в выборе</div><h1 class="rv" style="transition-delay:.05s">Гайды BORMAN</h1><p class="rv" style="transition-delay:.1s">Коротко и по делу: как выбрать технику под свои волосы и задачи, не переплатить и сохранить красоту надолго.</p></div>
    <div class="guides-grid" id="guides-grid" style="margin-top:20px"></div>
  </div>
  <div id="gsingle" style="display:none;padding-top:120px"></div>
</div></div>

<script src="shop.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const slug=new URLSearchParams(location.search).get('g');
  const g=slug&&GUIDES.find(x=>x.slug===slug);
  if(g){
    document.title=g.title+' — BORMAN';
    const md=document.querySelector('meta[name=description]'); if(md) md.content=g.excerpt;
    const el=document.getElementById('gsingle'); el.style.display='block';
    el.innerHTML=`<article class="gart">
      <div class="gcrumb"><a href="index.html">Главная</a> / <a href="guides.html">Гайды</a> / ${g.title}</div>
      <div class="eyebrow rv">Гайд · ${g.readmin} мин</div>
      <h1 class="rv" style="font-size:clamp(30px,4.5vw,50px);margin:10px 0">${g.title}</h1>
      <p class="lead rv">${g.intro}</p>
      ${g.sections.map(s=>`<div class="gsec rv"><h2>${s.h}</h2><p>${s.body}</p></div>`).join('')}
      <div class="tip rv"><b>Совет</b>${g.tip}</div>
      <div class="gart-cta rv"><h3>Готовы выбрать?</h3><p>Подберите модель в каталоге — с рассрочкой Kaspi 0-0-12 и гарантией 2 года.</p><a href="catalog.html" class="btn gold">В каталог</a></div>
    </article>`;
    const ld=document.createElement('script');ld.type='application/ld+json';
    ld.textContent=JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":g.title,"description":g.excerpt,"author":{"@type":"Organization","name":"BORMAN"},"publisher":{"@type":"Organization","name":"BORMAN"}});
    document.head.appendChild(ld);
  } else {
    document.getElementById('glist').style.display='block';
    renderGuideCards('#guides-grid');
  }
  revealScan();
  if(window.applyLang)applyLang(localStorage.getItem('borman_lang')||'ru');
});
</script>
</body>
</html>
